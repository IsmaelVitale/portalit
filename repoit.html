<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositório de Arquivos - TI Logística</title>
    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para os ícones (lupa, arquivos, pastas) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos adicionais sutis */
        body { font-family: 'Inter', system-ui, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<!-- Cabeçalho Principal -->
<header class="bg-slate-900 text-white shadow-md sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-server text-2xl text-blue-400"></i>
            <h1 class="text-xl font-bold tracking-tight">TI Logística <span class="text-slate-400 font-normal">| Downloads</span></h1>
        </div>

        <!-- Barra de Pesquisa -->
        <div class="relative w-full sm:w-96">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
            </div>
            <input
                    type="text"
                    id="searchInput"
                    class="block w-full pl-10 pr-3 py-2 border border-slate-700 rounded-lg leading-5 bg-slate-800 text-slate-300 placeholder-slate-400 focus:outline-none focus:bg-white focus:text-slate-900 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 sm:text-sm transition-colors duration-200"
                    placeholder="Pesquisar por nome ou pasta..."
            >
        </div>
    </div>
</header>

<!-- Container Principal -->
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col md:flex-row gap-8">

    <!-- Barra Lateral: Categorias (Pastas) -->
    <aside class="w-full md:w-64 flex-shrink-0">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 sticky top-24">
            <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                <i class="fa-regular fa-folder-open"></i> Pastas
            </h2>
            <ul id="categoryList" class="space-y-1">
                <!-- As categorias serão injetadas aqui via JavaScript -->
            </ul>
        </div>
    </aside>

    <!-- Área Principal: Grid de Arquivos -->
    <main class="flex-1">
        <div class="flex justify-between items-center mb-6">
            <h2 id="currentCategoryTitle" class="text-2xl font-bold text-slate-800">Todos os Arquivos</h2>
            <span id="fileCount" class="text-sm font-medium bg-blue-100 text-blue-800 py-1 px-3 rounded-full">
                    0 arquivos
                </span>
        </div>

        <!-- Grid -->
        <div id="filesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Os cards de arquivos serão injetados aqui -->
        </div>

        <!-- Mensagem de "Nenhum arquivo encontrado" -->
        <div id="noResults" class="hidden flex-col items-center justify-center py-12 text-center bg-white rounded-xl border border-dashed border-slate-300">
            <i class="fa-solid fa-box-open text-4xl text-slate-300 mb-3"></i>
            <h3 class="text-lg font-medium text-slate-900">Nenhum arquivo encontrado</h3>
            <p class="text-slate-500 mt-1">Tente buscar por outro termo ou mude a pasta selecionada.</p>
        </div>
    </main>
</div>

<script>
    // 1. Array de Arquivos (Hospedagem Estática)
    // Certifique-se de que a estrutura de pastas no Cloudflare seja exatamente como os nomes definidos aqui.
    // Exemplo: crie uma pasta "ECOM" na raiz do seu projeto e coloque o "ITXRFIDController.zip" lá dentro.
    const filesData = [
        {
            id: 1,
            name: "ITXRFIDController.zip",
            folder: "ECOM",
            size: "14.2 MB",
            date: "25 Out 2025",
            type: "zip"
        },
        { id: 2, name: "Drive RNDIS.rar", folder: "ECOM", size: "0.5 MB", date: "25 Mar 2026", type: "rar" },
        { id: 3, name: "ASLO - ERA config manual v1.2 ptbr.pdf", folder: "ECOM", size: "2 MB", date: "25 Mar 2026", type: "pdf" },
        { id: 4, name: "BBProfile.json", folder: "PDA", size: "33 KB", date: "31 Mar 2026", type: "json" }
        // Você pode adicionar mais arquivos aqui facilmente:
        // { id: 2, name: "Manual_Coletores.pdf", folder: "Manuais", size: "2.5 MB", date: "26 Out 2025", type: "pdf" }
    ];

    // 2. Estado da Aplicação
    let currentFilter = 'Todos';
    let searchQuery = '';

    // 3. Seletores DOM
    const filesGrid = document.getElementById('filesGrid');
    const categoryList = document.getElementById('categoryList');
    const searchInput = document.getElementById('searchInput');
    const currentCategoryTitle = document.getElementById('currentCategoryTitle');
    const fileCount = document.getElementById('fileCount');
    const noResults = document.getElementById('noResults');

    // 4. Funções de Renderização e Lógica

    // Inicializa a aplicação
    function initApp() {
        renderCategories();
        filterAndRenderFiles();
    }

    // Pega as pastas únicas baseadas no array de arquivos
    function getUniqueFolders() {
        const folders = filesData.map(file => file.folder);
        return ['Todos', ...new Set(folders)].sort();
    }

    // Renderiza o menu lateral de categorias
    function renderCategories() {
        const folders = getUniqueFolders();
        categoryList.innerHTML = '';

        folders.forEach(folder => {
            const li = document.createElement('li');
            const isActive = folder === currentFilter;

            // Estilização dinâmica da categoria ativa
            li.className = `
                    cursor-pointer px-3 py-2 rounded-lg text-sm font-medium transition-colors flex justify-between items-center
                    ${isActive ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}
                `;

            // Ícone condicional (Todos vs Pasta específica)
            const iconClass = folder === 'Todos' ? 'fa-solid fa-layer-group' : 'fa-solid fa-folder';

            // Conta quantos arquivos tem na pasta
            const count = folder === 'Todos'
                ? filesData.length
                : filesData.filter(f => f.folder === folder).length;

            li.innerHTML = `
                    <div class="flex items-center gap-2">
                        <i class="${iconClass} ${isActive ? 'text-blue-500' : 'text-slate-400'}"></i>
                        ${folder}
                    </div>
                    <span class="text-xs bg-slate-200 text-slate-600 py-0.5 px-2 rounded-full">${count}</span>
                `;

            li.addEventListener('click', () => {
                currentFilter = folder;
                renderCategories(); // Re-renderiza para atualizar o visual "ativo"
                filterAndRenderFiles();
            });

            categoryList.appendChild(li);
        });
    }

    // Define qual ícone usar baseado na extensão do arquivo
    function getFileIcon(type) {
        switch(type.toLowerCase()) {
            case 'zip': return '<i class="fa-regular fa-file-zipper text-4xl text-amber-500"></i>';
            case 'pdf': return '<i class="fa-regular fa-file-pdf text-4xl text-red-500"></i>';
            case 'exe': return '<i class="fa-brands fa-windows text-4xl text-blue-500"></i>';
            default: return '<i class="fa-regular fa-file text-4xl text-slate-400"></i>';
        }
    }

    // Filtra os arquivos por pesquisa e por pasta, depois renderiza no grid
    function filterAndRenderFiles() {
        let filtered = filesData;

        // Aplica filtro de categoria
        if (currentFilter !== 'Todos') {
            filtered = filtered.filter(f => f.folder === currentFilter);
            currentCategoryTitle.textContent = `Pasta: ${currentFilter}`;
        } else {
            currentCategoryTitle.textContent = 'Todos os Arquivos';
        }

        // Aplica filtro de pesquisa
        if (searchQuery.trim() !== '') {
            const query = searchQuery.toLowerCase();
            filtered = filtered.filter(f =>
                f.name.toLowerCase().includes(query) ||
                f.folder.toLowerCase().includes(query)
            );
        }

        // Atualiza contador
        fileCount.textContent = `${filtered.length} arquivo${filtered.length !== 1 ? 's' : ''}`;

        // Controla visibilidade da mensagem de "nenhum resultado"
        if (filtered.length === 0) {
            filesGrid.innerHTML = '';
            filesGrid.classList.add('hidden');
            noResults.classList.remove('hidden');
            noResults.classList.add('flex');
            return;
        } else {
            filesGrid.classList.remove('hidden');
            noResults.classList.add('hidden');
            noResults.classList.remove('flex');
        }

        // Renderiza os cards
        filesGrid.innerHTML = '';
        filtered.forEach(file => {
            const card = document.createElement('div');
            card.className = "bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow group flex flex-col justify-between h-full";

            // O caminho dinâmico para o arquivo é montado aqui: ./pasta/arquivo.extensao
            const filePath = `./${file.folder}/${file.name}`;

            card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            ${getFileIcon(file.type)}
                            <span class="inline-flex items-center gap-1 bg-slate-100 text-slate-600 text-xs font-medium px-2 py-1 rounded">
                                <i class="fa-solid fa-folder-tree text-[10px]"></i> ${file.folder}
                            </span>
                        </div>
                        <h3 class="font-semibold text-slate-800 text-sm mb-1 break-words line-clamp-2" title="${file.name}">
                            ${file.name}
                        </h3>
                        <div class="flex items-center gap-3 text-xs text-slate-500 mb-4">
                            <span><i class="fa-solid fa-weight-scale mr-1"></i>${file.size}</span>
                            <span><i class="fa-regular fa-calendar mr-1"></i>${file.date}</span>
                        </div>
                    </div>
                    <a href="${filePath}" download="${file.name}" target="_blank" rel="noopener noreferrer" class="w-full bg-slate-50 text-slate-700 hover:bg-blue-600 hover:text-white border border-slate-200 hover:border-blue-600 font-medium py-2 px-4 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
                        <i class="fa-solid fa-download"></i> Baixar
                    </a>
                `;
            filesGrid.appendChild(card);
        });
    }

    // 5. Listeners de Eventos
    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        filterAndRenderFiles();
    });

    // Inicializa o sistema ao carregar a página
    window.addEventListener('DOMContentLoaded', initApp);

</script>
</body>
</html>
