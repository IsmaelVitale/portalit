<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD 1 - Migração Zara Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        .toast {
            animation: fadeOut 2s forwards;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen p-3 sm:p-6">

<div class="max-w-7xl mx-auto">

    <!-- Botão Voltar -->
    <div class="mb-4">
        <a href="index.html" class="inline-flex items-center text-sm text-gray-500 hover:text-black font-medium transition-colors">
            <i class="fas fa-arrow-left mr-2"></i> Voltar ao Menu Principal
        </a>
    </div>

    <!-- Header -->
    <header class="mb-6 sm:mb-8 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-100">
        <div class="flex items-center gap-4 w-full lg:w-auto">
            <div class="bg-black p-3 rounded-lg flex-shrink-0">
                <i class="fas fa-random text-white text-xl sm:text-2xl"></i>
            </div>
            <div>
                <h1 class="text-xl sm:text-2xl font-bold tracking-tight text-gray-900">Migração - Zara Online</h1>
                <p class="text-xs sm:text-sm text-gray-500 mt-1">De/Para de Hostnames e Gestão de Blocos de IP</p>
            </div>
        </div>

        <!-- Grupo de Ações (Download + Pesquisa) -->
        <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto items-center">
            <a href="planilha_ips_zara_online.xlsx" download class="w-full sm:w-auto flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-3 rounded-lg font-medium transition-colors text-sm shadow-sm flex-shrink-0">
                <i class="fas fa-file-excel"></i>
                Baixar Planilha
            </a>

            <div class="relative w-full sm:w-72 md:w-96 flex-shrink-0">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-search text-gray-400"></i>
                </div>
                <input type="text" id="searchInput" class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-lg leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition duration-150 ease-in-out text-sm" placeholder="Buscar por estação (ex: TGT501)...">
            </div>
        </div>
    </header>

    <div id="toastContainer" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

    <div id="stationsContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-4 sm:gap-6">
        <!-- Cards gerados via JS -->
    </div>
</div>

<script>
    const xmlData = `<?xml version="1.0" encoding="UTF-8"?>
        <stations>
            <station id="EZBRSAOTGT501" old_id="ECBR287TGT0012">
                <rfid>10.15.15.108</rfid>
                <courier>10.15.15.107</courier>
                <price>Pendente</price>
                <invoice_a5>Pendente</invoice_a5>
                <invoice_zebra>10.15.15.121</invoice_zebra>
            </station>
            <station id="EZBRSAOTGT502" old_id="ECBR287TGT0013">
                <rfid>10.15.15.110</rfid>
                <courier>10.15.15.109</courier>
                <price>Pendente</price>
                <invoice_a5>Pendente</invoice_a5>
                <invoice_zebra>10.15.15.122</invoice_zebra>
            </station>
            <station id="EZBRSAOTGT503" old_id="ECBR287TGT0010">
                <rfid>10.15.15.101</rfid>
                <courier>10.15.15.102</courier>
                <price>Pendente</price>
                <invoice_a5>10.15.15.103</invoice_a5>
                <invoice_zebra>10.15.15.119</invoice_zebra>
            </station>
            <station id="EZBRSAOTGT504" old_id="ECBR287TGT0011">
                <rfid>10.15.15.104</rfid>
                <courier>10.15.15.105</courier>
                <price>Pendente</price>
                <invoice_a5>10.15.15.106</invoice_a5>
                <invoice_zebra>10.15.15.120</invoice_zebra>
            </station>
            <station id="EZBRSAOTGT505" old_id="ECBR287TGT0008">
                <rfid>10.15.15.95</rfid>
                <courier>10.15.15.96</courier>
                <price>Pendente</price>
                <invoice_a5>10.15.15.97</invoice_a5>
                <invoice_zebra>10.15.15.117</invoice_zebra>
            </station>
            <station id="EZBRSAOTGT506" old_id="ECBR287TGT0009">
                <rfid>10.15.15.98</rfid>
                <courier>10.15.15.99</courier>
                <price>Pendente</price>
                <invoice_a5>10.15.15.100</invoice_a5>
                <invoice_zebra>10.15.15.118</invoice_zebra>
            </station>
            <station id="EZBRSAOTGT507" old_id="ECBR287TGT0006">
                <rfid>10.15.15.86</rfid>
                <courier>10.15.15.87</courier>
                <price>10.15.15.88</price>
                <invoice_a5>10.15.15.89</invoice_a5>
                <invoice_zebra>10.15.15.115</invoice_zebra>
            </station>
            <station id="EZBRSAOTGT508" old_id="ECBR287TGT0007">
                <rfid>10.15.15.90</rfid>
                <courier>10.15.15.91</courier>
                <price>10.15.15.92</price>
                <invoice_a5>10.15.15.93</invoice_a5>
                <invoice_zebra>10.15.15.116</invoice_zebra>
            </station>
            <station id="EZBRSAOTGT509" old_id="ECBR287TGT0004">
                <rfid>10.15.15.78</rfid>
                <courier>10.15.15.79</courier>
                <price>10.15.15.80</price>
                <invoice_a5>10.15.15.81</invoice_a5>
                <invoice_zebra>10.15.15.113</invoice_zebra>
            </station>
            <station id="EZBRSAOTGT510" old_id="ECBR287TGT0005">
                <rfid>10.15.15.82</rfid>
                <courier>10.15.15.83</courier>
                <price>10.15.15.84</price>
                <invoice_a5>10.15.15.85</invoice_a5>
                <invoice_zebra>10.15.15.114</invoice_zebra>
            </station>
            <station id="EZBRSAOTGT511" old_id="ECBR287TGT0002">
                <rfid>10.15.15.70</rfid>
                <courier>10.15.15.71</courier>
                <price>10.15.15.72</price>
                <invoice_a5>10.15.15.73</invoice_a5>
                <invoice_zebra>10.15.15.111</invoice_zebra>
            </station>
            <station id="EZBRSAOTGT512" old_id="ECBR287TGT0003">
                <rfid>10.15.15.74</rfid>
                <courier>10.15.15.75</courier>
                <price>10.15.15.76</price>
                <invoice_a5>10.15.15.77</invoice_a5>
                <invoice_zebra>10.15.15.112</invoice_zebra>
            </station>
        </stations>`;

    let allStations = [];

    function initData() {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlData, "text/xml");
        const stationsNodes = xmlDoc.querySelectorAll("station");

        allStations = Array.from(stationsNodes).map(station => {
            return {
                id: station.getAttribute('id'),
                old_id: station.getAttribute('old_id'),
                rfid: station.querySelector('rfid')?.textContent,
                courier: station.querySelector('courier')?.textContent,
                price: station.querySelector('price')?.textContent,
                invoice_a5: station.querySelector('invoice_a5')?.textContent,
                invoice_zebra: station.querySelector('invoice_zebra')?.textContent
            };
        });

        renderCards(allStations);
    }

    function createIpRow(iconClass, label, ip, subtitle = '', isConfigured = true) {
        if (!ip || ip.trim().toLowerCase() === 'pendente') return '';

        const subtitleHtml = subtitle ? `<span class="text-[10px] text-gray-400 block tracking-wide uppercase mt-0.5 leading-none">${subtitle}</span>` : '';

        let badgeClass = 'bg-white text-gray-700 border-gray-200 font-mono shadow-sm';
        if (!isConfigured) {
            badgeClass = 'bg-gray-50 text-gray-500 border-gray-200 font-mono opacity-80';
        }

        const rowStyle = !isConfigured ? 'border-b border-gray-100 bg-gray-50/40' : 'border-b border-gray-100 hover:bg-gray-50';
        const iconColor = !isConfigured ? 'text-gray-300' : 'text-gray-400 group-hover:text-blue-600';

        const copyButton = `
                <button onclick="copyToClipboard('${ip}', '${label}')" class="text-gray-400 hover:text-blue-600 p-1.5 rounded-md hover:bg-blue-50 transition-colors flex-shrink-0" title="Copiar IP">
                    <i class="far fa-copy"></i>
                </button>
            `;

        const noEqpTag = !isConfigured ? `<span class="mt-1 text-[9px] uppercase font-bold tracking-wider bg-amber-100 text-amber-700 border border-amber-200 px-1.5 py-0.5 rounded inline-block w-max">Sem Equipamento</span>` : '';

        return `
                <div class="flex items-center justify-between p-2.5 rounded-lg transition-colors ${rowStyle} last:border-b-0 group my-0.5 gap-2">
                    <div class="flex items-start text-gray-600 min-w-0 flex-1">
                        <div class="w-8 h-8 rounded bg-gray-100 flex items-center justify-center mr-3 transition-colors flex-shrink-0 mt-0.5">
                            <i class="${iconClass} ${iconColor}"></i>
                        </div>
                        <div class="flex flex-col justify-center min-w-0 pt-1">
                            <span class="text-sm font-medium leading-tight truncate block">${label}</span>
                            ${subtitleHtml}
                            ${noEqpTag}
                        </div>
                    </div>
                    <div class="flex items-center gap-1 sm:gap-2 flex-shrink-0">
                        <span class="text-xs sm:text-sm px-1.5 sm:px-2 py-1 rounded select-all border ${badgeClass}">${ip}</span>
                        ${copyButton}
                    </div>
                </div>
            `;
    }

    function renderCards(stations) {
        const container = document.getElementById('stationsContainer');
        container.innerHTML = '';

        if (stations.length === 0) {
            container.innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-xl border border-gray-200">
                        <i class="fas fa-search text-4xl text-gray-300 mb-3"></i>
                        <p class="text-gray-500 text-lg">Nenhuma estação encontrada.</p>
                    </div>
                `;
            return;
        }

        stations.forEach(station => {
            const statusText = 'PAC';
            const statusBadge = `<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                     <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>`;

            const isZebraConfigured = station.old_id === 'ECBR287TGT0013';

            const card = document.createElement('div');
            card.className = "bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-lg transition-all duration-300 flex flex-col";

            card.innerHTML = `
                    <div class="bg-gray-900 px-4 sm:px-5 py-3 border-b border-gray-900 flex justify-between items-center">
                        <div class="flex flex-col">
                            <h3 class="text-white font-bold text-base sm:text-lg flex items-center tracking-wide leading-tight">
                                <i class="fas fa-desktop mr-2 sm:mr-3 text-blue-400"></i>
                                ${station.id}
                            </h3>
                            <span class="text-[10px] text-gray-400 font-mono ml-6 sm:ml-7">Antiga: ${station.old_id}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-gray-400 font-bold tracking-wider">${statusText}</span>
                            <span class="flex h-3 w-3 relative">
                                ${statusBadge}
                            </span>
                        </div>
                    </div>
                    <div class="p-3 sm:p-4 flex flex-col gap-0.5 sm:gap-1 flex-grow">
                        ${createIpRow('fas fa-wifi', 'RFID', station.rfid, 'IDX4000', true)}
                        ${createIpRow('fas fa-truck-fast', 'Courier', station.courier, 'Zebra ZD421', true)}
                        ${createIpRow('fas fa-tag', 'Price', station.price, 'Zebra ZD421', false)}
                        ${createIpRow('fas fa-print', 'Invoice A5', station.invoice_a5, 'RICOH', false)}
                        ${createIpRow('fas fa-file-invoice', 'Invoice Zebra', station.invoice_zebra, 'Zebra ZD421t', isZebraConfigured)}
                    </div>
                    <div class="bg-black px-4 py-2 border-t border-gray-800 flex justify-end items-center">
                        <span class="inline-flex items-center px-2.5 py-1 rounded border border-gray-700 text-white text-xs font-bold tracking-widest uppercase">
                            <i class="fas fa-globe mr-1.5 opacity-80"></i>
                            ZARA ONLINE
                        </span>
                    </div>
                `;
            container.appendChild(card);
        });
    }

    function copyToClipboard(text, label) {
        const tempInput = document.createElement("input");
        tempInput.value = text;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);

        showToast(`IP do <b>${label}</b> copiado! (${text})`);
    }

    function showToast(message) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast bg-gray-900 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 text-sm border-l-4 border-emerald-500';
        toast.innerHTML = `
                <i class="fas fa-check-circle text-emerald-400 text-lg"></i>
                <span>${message}</span>
            `;

        container.appendChild(toast);

        setTimeout(() => {
            if (container.contains(toast)) {
                container.removeChild(toast);
            }
        }, 2000);
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase();
        const filteredStations = allStations.filter(station =>
            station.id.toLowerCase().includes(searchTerm) ||
            station.old_id.toLowerCase().includes(searchTerm)
        );
        renderCards(filteredStations);
    });

    document.addEventListener('DOMContentLoaded', initData);
</script>
</body>
</html>
